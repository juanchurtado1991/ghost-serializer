[versions]
# Build Tools & Languages
agp = "8.7.3"
junit-platform-engine = "1.11.3"
junit-vintage-engine = "5.11.3"
kotlin = "2.1.10"
kotlin-test-junit5 = "2.1.0"
kotlinx-coroutines-test = "1.10.1"
ksp = "2.1.10-1.0.30"
compose-plugin = "1.7.3"
ktor = "3.0.0"

# Libraries
okio = "3.9.1"
kotlinpoet = "1.16.0"
retrofit = "2.11.0"
okhttp = "4.12.0"
gson = "2.11.0"
moshi = "1.15.2"
kotlinx-serialization = "1.7.3"
ktorfit = "2.3.0"

# Sample App UI
coil = "3.0.4"
ghost = "1.1.0"

[libraries]
# Ghost Serialization (Industrial 1.0.0)
ghost-api = { group = "com.ghost", name = "serialization-api", version.ref = "ghost" }
ghost-core = { group = "com.ghost", name = "serialization", version.ref = "ghost" }
ghost-compiler = { group = "com.ghost", name = "serialization-compiler", version.ref = "ghost" }
ghost-ktor = { group = "com.ghost", name = "serialization-ktor", version.ref = "ghost" }
ghost-retrofit = { group = "com.ghost", name = "serialization-retrofit", version.ref = "ghost" }

junit-platform-engine = { module = "org.junit.platform:junit-platform-engine", version.ref = "junit-platform-engine" }
junit-vintage-engine = { module = "org.junit.vintage:junit-vintage-engine", version.ref = "junit-vintage-engine" }
kotlin-test-junit5 = { module = "org.jetbrains.kotlin:kotlin-test-junit5", version.ref = "kotlin-test-junit5" }
kotlinx-coroutines-test = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-test", version.ref = "kotlinx-coroutines-test" }
okio = { group = "com.squareup.okio", name = "okio", version.ref = "okio" }

# Compiler & KSP
kotlinpoet = { group = "com.squareup", name = "kotlinpoet", version.ref = "kotlinpoet" }
kotlinpoet-ksp = { group = "com.squareup", name = "kotlinpoet-ksp", version.ref = "kotlinpoet" }
ksp-api = { group = "com.google.devtools.ksp", name = "symbol-processing-api", version.ref = "ksp" }

# Optional Integrations (For separate modules)
retrofit = { group = "com.squareup.retrofit2", name = "retrofit", version.ref = "retrofit" }
okhttp = { group = "com.squareup.okhttp3", name = "okhttp", version.ref = "okhttp" }
gson = { group = "com.google.code.gson", name = "gson", version.ref = "gson" }
moshi = { group = "com.squareup.moshi", name = "moshi", version.ref = "moshi" }
moshi-kotlin = { group = "com.squareup.moshi", name = "moshi-kotlin", version.ref = "moshi" }
kotlinx-serialization-json = { group = "org.jetbrains.kotlinx", name = "kotlinx-serialization-json", version.ref = "kotlinx-serialization" }

# Testing
kotlin-test = { group = "org.jetbrains.kotlin", name = "kotlin-test", version.ref = "kotlin" }
junit-launcher = { group = "org.junit.platform", name = "junit-platform-launcher", version = "6.0.3" }
junit-engine = { group = "org.junit.jupiter", name = "junit-jupiter-engine", version = "6.0.3" }

ktor-client-core = { group = "io.ktor", name = "ktor-client-core", version.ref = "ktor" }
ktor-client-okhttp = { group = "io.ktor", name = "ktor-client-okhttp", version.ref = "ktor" }
ktor-client-darwin = { group = "io.ktor", name = "ktor-client-darwin", version.ref = "ktor" }
androidx-activity-compose = { group = "androidx.activity", name = "activity-compose", version = "1.9.1" }
ktorfit-lib = { group = "de.jensklingenberg.ktorfit", name = "ktorfit-lib", version.ref = "ktorfit" }
ktorfit-ksp = { group = "de.jensklingenberg.ktorfit", name = "ktorfit-ksp", version.ref = "ktorfit" }
ktor-client-content-negotiation = { group = "io.ktor", name = "ktor-client-content-negotiation", version.ref = "ktor" }
coil-compose = { group = "io.coil-kt.coil3", name = "coil-compose", version.ref = "coil" }
coil-network-ktor = { group = "io.coil-kt.coil3", name = "coil-network-ktor3", version.ref = "coil" }

[plugins]
compose-compiler = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }
jetbrains-compose = { id = "org.jetbrains.compose", version.ref = "compose-plugin" }
android-application = { id = "com.android.application", version.ref = "agp" }
android-library = { id = "com.android.library", version.ref = "agp" }
kotlin-android = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
ksp = { id = "com.google.devtools.ksp", version.ref = "ksp" }
kotlin-serialization = { id = "org.jetbrains.kotlin.plugin.serialization", version.ref = "kotlin" }
ktorfit = { id = "de.jensklingenberg.ktorfit", version.ref = "ktorfit" }
