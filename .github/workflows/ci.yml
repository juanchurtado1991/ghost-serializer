name: Ghost CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-jvm:
    name: Tests (JVM)
    runs-on: ubuntu-latest
    permissions:
      # Only this job pushes the coverage report back to main; every other job stays read-only.
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: JVM test suite (ciTestJvm)
        run: ./gradlew ciTestJvm

      - name: Generate Kover coverage report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./gradlew koverHtmlReport

      - name: Publish coverage report to docs/coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          rm -rf docs/coverage
          mkdir -p docs/coverage
          cp -r build/reports/kover/html/. docs/coverage/
          touch docs/coverage/.nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/coverage

          if git diff --cached --quiet; then
            echo "Coverage report unchanged, nothing to commit."
          else
            git commit -m "chore: update coverage report [skip ci]"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD:"${GITHUB_REF_NAME}"
          fi

  test-android:
    name: Tests (Android)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: ghost-serialization Android unit tests
        run: ./gradlew :ghost-serialization:testDebugUnitTest

  test-ios:
    name: Tests (iOS)
    # Apple Silicon + Xcode required; iosSimulatorArm64Test is SKIPPED on Linux/Intel runners.
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: ghost-serialization iOS simulator tests
        run: |
          set -euo pipefail
          log="$(mktemp)"
          # K/N iOS tests do not print "N tests completed" (unlike JVM JUnit). Trust Gradle exit code.
          ./gradlew :ghost-serialization:kspCommonMainKotlinMetadata :ghost-serialization:iosSimulatorArm64Test --rerun-tasks --console=plain 2>&1 | tee "$log"
          gradle_exit="${PIPESTATUS[0]}"
          if [[ "$gradle_exit" -ne 0 ]]; then
            echo "::error::Gradle exited with $gradle_exit"
            exit "$gradle_exit"
          fi
          if grep -q "> Task :ghost-serialization:iosSimulatorArm64Test SKIPPED" "$log"; then
            echo "::error::iosSimulatorArm64Test was SKIPPED (needs macOS + Xcode + Apple Silicon)"
            exit 1
          fi
          if grep -q "> Task :ghost-serialization:iosSimulatorArm64Test FAILED" "$log"; then
            echo "::error::iosSimulatorArm64Test task failed"
            exit 1
          fi
          echo "iosSimulatorArm64Test completed (BUILD SUCCESSFUL)"

  publish-check:
    name: Publish dry-run (Maven Local)
    runs-on: ubuntu-latest
    needs: [test-jvm, test-android, test-ios]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish all modules to Maven Local
        run: ./gradlew publishToMavenLocal -PskipTests
