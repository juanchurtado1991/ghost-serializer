name: Ghost CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Tests (JVM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Core library tests
      - name: ghost-serialization JVM tests
        run: ./gradlew :ghost-serialization:jvmTest

      # Networking adapter tests
      - name: ghost-ktor JVM tests
        run: ./gradlew :ghost-ktor:jvmTest

      # Compiler / KSP tests
      - name: ghost-compiler tests
        run: ./gradlew :ghost-compiler:test

      # Publish to mavenLocal first so functional tests use locally-built artifacts
      # (compiled with Kotlin 1.9.24), not stale Maven Central artifacts (Kotlin 2.3.0)
      - name: Publish to Maven Local (for functional tests)
        run: ./gradlew publishToMavenLocal -x test

      # Gradle plugin tests
      - name: ghost-gradle-plugin tests
        run: ./gradlew :ghost-gradle-plugin:test

      # End-to-end integration tests (real KSP generation + deserialization)
      - name: ghost-integration-test
        run: ./gradlew :ghost-integration-test:test

      # Retrofit adapter tests
      - name: ghost-retrofit tests
        run: ./gradlew :ghost-retrofit:test

      # Spring Boot starter tests
      - name: ghost-spring-boot-starter tests
        run: ./gradlew :ghost-spring-boot-starter:test

  publish-check:
    name: Publish dry-run (Maven Local)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish all modules to Maven Local
        run: ./gradlew publishToMavenLocal -PskipTests
