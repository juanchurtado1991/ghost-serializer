name: Ghost CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-jvm:
    name: Tests (JVM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: ghost-serialization JVM tests
        run: ./gradlew :ghost-serialization:jvmTest

      - name: ghost-ktor JVM tests
        run: ./gradlew :ghost-ktor:jvmTest

      - name: ghost-compiler tests
        run: ./gradlew :ghost-compiler:test

      - name: Publish to Maven Local (for functional tests)
        run: ./gradlew publishToMavenLocal -x test

      - name: ghost-gradle-plugin tests
        run: ./gradlew :ghost-gradle-plugin:test

      - name: ghost-integration-test
        run: ./gradlew :ghost-integration-test:test

      - name: ghost-retrofit tests
        run: ./gradlew :ghost-retrofit:test

      - name: ghost-spring-boot-starter tests
        run: ./gradlew :ghost-spring-boot-starter:test

  test-android:
    name: Tests (Android)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: ghost-serialization Android unit tests
        run: ./gradlew :ghost-serialization:testDebugUnitTest

  test-ios:
    name: Tests (iOS)
    # Apple Silicon + Xcode required; iosSimulatorArm64Test is SKIPPED on Linux/Intel runners.
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: KSP metadata (required before iOS compile)
        run: ./gradlew :ghost-serialization:kspCommonMainKotlinMetadata

      - name: ghost-serialization iOS simulator tests
        run: |
          set -o pipefail
          ./gradlew :ghost-serialization:iosSimulatorArm64Test --rerun-tasks 2>&1 | tee gradle-ios.log
          if grep -q "iosSimulatorArm64Test SKIPPED" gradle-ios.log; then
            echo "::error::iosSimulatorArm64Test was SKIPPED (needs macOS + Xcode + Apple Silicon simulator target)"
            exit 1
          fi
          if ! grep -qE "[0-9]+ tests? completed" gradle-ios.log; then
            echo "::error::No test summary in Gradle output (iosSimulatorArm64Test may not have executed)"
            exit 1
          fi

  publish-check:
    name: Publish dry-run (Maven Local)
    runs-on: ubuntu-latest
    needs: [test-jvm, test-android, test-ios]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Publish all modules to Maven Local
        run: ./gradlew publishToMavenLocal -PskipTests
